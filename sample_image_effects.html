<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- SEO -->
    <meta name="description" content="同じ1枚の写真を19通りにCSSで変化させる実演。grayscale・sepia・blur・ネオン等。">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://css-showcase-tan.vercel.app/sample_image_effects.html">
    <meta property="og:title" content="画像エフェクト見本市 | カフェ東城">
    <meta property="og:description" content="同じ1枚の写真を19通りにCSSで変化させる実演。grayscale・sepia・blur・ネオン等。">
    <meta property="og:image" content="https://css-showcase-tan.vercel.app/images/og-image.jpg">
    <meta property="og:site_name" content="カフェ東城 CSS見本市">
    <meta property="og:locale" content="ja_JP">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="画像エフェクト見本市 | カフェ東城">
    <meta name="twitter:description" content="同じ1枚の写真を19通りにCSSで変化させる実演。grayscale・sepia・blur・ネオン等。">
    <meta name="twitter:image" content="https://css-showcase-tan.vercel.app/images/og-image.jpg">
    <title>画像エフェクト見本市 | カフェ東城</title>
    <link rel="stylesheet" href="sample_image_effects.css">
    <script src="mixer.js" defer></script>
</head>
<body>

<header class="page-header">
    <h1>画像エフェクト見本市</h1>
    <p>同じ1枚のカフェ写真を、CSSでどれだけ印象変化させられるか</p>
    <p><a href="index.html">← ポータルに戻る</a></p>
</header>

<main class="gallery">

    <!-- オリジナル -->
    <figure class="effect-item">
        <img class="original"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内">
        <figcaption>
            <strong>オリジナル</strong>
            <code>(フィルターなし)</code>
        </figcaption>
    </figure>

    <!-- モノクロ -->
    <figure class="effect-item">
        <img class="grayscale"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 モノクロ">
        <figcaption>
            <strong>モノクロ</strong>
            <code>filter: grayscale(100%)</code>
        </figcaption>
    </figure>

    <!-- セピア -->
    <figure class="effect-item">
        <img class="sepia"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 セピア">
        <figcaption>
            <strong>セピア</strong>
            <code>filter: sepia(80%)</code>
        </figcaption>
    </figure>

    <!-- 暗めムーディー -->
    <figure class="effect-item">
        <img class="moody"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 暗め">
        <figcaption>
            <strong>暗めムーディー</strong>
            <code>brightness(0.6) contrast(1.2)</code>
        </figcaption>
    </figure>

    <!-- 明るく -->
    <figure class="effect-item">
        <img class="bright"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 明るく">
        <figcaption>
            <strong>明るく</strong>
            <code>filter: brightness(1.3)</code>
        </figcaption>
    </figure>

    <!-- コントラスト強 -->
    <figure class="effect-item">
        <img class="high-contrast"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 コントラスト強">
        <figcaption>
            <strong>コントラスト強</strong>
            <code>filter: contrast(1.6)</code>
        </figcaption>
    </figure>

    <!-- 彩度高め -->
    <figure class="effect-item">
        <img class="saturate"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 彩度高">
        <figcaption>
            <strong>彩度高め</strong>
            <code>filter: saturate(2)</code>
        </figcaption>
    </figure>

    <!-- ぼかし -->
    <figure class="effect-item">
        <img class="blur"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 ぼかし">
        <figcaption>
            <strong>ぼかし</strong>
            <code>filter: blur(4px)</code>
        </figcaption>
    </figure>

    <!-- 色相回転 -->
    <figure class="effect-item">
        <img class="hue"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 色相回転">
        <figcaption>
            <strong>色相回転</strong>
            <code>filter: hue-rotate(90deg)</code>
        </figcaption>
    </figure>

    <!-- 反転 -->
    <figure class="effect-item">
        <img class="invert"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 色反転">
        <figcaption>
            <strong>色反転（ネガ）</strong>
            <code>filter: invert(100%)</code>
        </figcaption>
    </figure>

    <!-- 半透明 -->
    <figure class="effect-item">
        <img class="transparent"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 半透明">
        <figcaption>
            <strong>半透明</strong>
            <code>opacity: 0.4</code>
        </figcaption>
    </figure>

    <!-- ヴィンテージ -->
    <figure class="effect-item">
        <img class="vintage"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 ヴィンテージ">
        <figcaption>
            <strong>ヴィンテージ（合わせ技）</strong>
            <code>sepia(40%) contrast(1.15) saturate(1.3)</code>
        </figcaption>
    </figure>

    <!-- 角丸大 -->
    <figure class="effect-item">
        <img class="rounded-large"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 角丸">
        <figcaption>
            <strong>角丸大</strong>
            <code>border-radius: 30px</code>
        </figcaption>
    </figure>

    <!-- 円形 -->
    <figure class="effect-item">
        <img class="circle"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 円形">
        <figcaption>
            <strong>円形</strong>
            <code>border-radius: 50%</code>
        </figcaption>
    </figure>

    <!-- 影付き -->
    <figure class="effect-item">
        <img class="shadow"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 影付き">
        <figcaption>
            <strong>影付き（浮き上がり）</strong>
            <code>box-shadow: 0 10px 30px rgba(0,0,0,0.4)</code>
        </figcaption>
    </figure>

    <!-- ポラロイド風 -->
    <figure class="effect-item">
        <img class="polaroid"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 ポラロイド">
        <figcaption>
            <strong>ポラロイド風</strong>
            <code>border + shadow</code>
        </figcaption>
    </figure>

    <!-- ホバーで色に戻る -->
    <figure class="effect-item">
        <img class="hover-color"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 ホバーで変化">
        <figcaption>
            <strong>ホバーで色が戻る ★触ってみて</strong>
            <code>:hover { filter: grayscale(0%) }</code>
        </figcaption>
    </figure>

    <!-- ホバーでズーム -->
    <figure class="effect-item">
        <img class="hover-zoom"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 ホバーで拡大">
        <figcaption>
            <strong>ホバーで拡大 ★触ってみて</strong>
            <code>:hover { transform: scale(1.1) }</code>
        </figcaption>
    </figure>

    <!-- オーバーレイ付き -->
    <figure class="effect-item overlay-container">
        <img class="overlay-image"
             src="images/cafe-exterior.jpg"
             alt="カフェ店内 テキストオーバーレイ">
        <div class="overlay-text">Cafe Tojo</div>
        <figcaption>
            <strong>テキスト重ね</strong>
            <code>position: absolute でテキスト配置</code>
        </figcaption>
    </figure>

</main>

<footer class="page-footer">
    <p>元の画像は1枚、CSSで19通りに変化。全て <code>sample_image_effects.css</code> で制御しています。</p>
    <p><a href="index.html">← ポータルに戻る</a></p>
</footer>

</body>
</html>
